---
name: Gradle

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    strategy:
      matrix:
        java: [8, 11, 17, 21]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      gradle_commands: --stacktrace build
      ArtifactoryUserName: ${{ secrets.JENKINS_USERNAME }}
      ArtifactoryPassword: ${{ secrets.JENKINS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
      - name: Install libraries
        run: |
          sudo apt-get install -y libblosc1
      - name: Run commands
        run: |
          ./gradlew ${{ env.gradle_commands }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raw2ometiff ${{ matrix.java }}
          path: build/distributions/*.zip
          retention-days: 30
      - name: Publish artifacts
        if: github.event_name != 'pull_request' && matrix.java == 11 && github.repository_owner == 'glencoesoftware'
        run: |
          ./gradlew -PArtifactoryUserName=${ArtifactoryUserName} -PArtifactoryPassword=${ArtifactoryPassword} publish
  release:
    if: startsWith(github.ref, 'refs/tags')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts from build
        uses: actions/download-artifact@v4
        with:
          name: raw2ometiff 8
      - name: List artifacts
        run: ls -R
      - name: Create a GitHub release
        run: gh release create --generate-notes "${GITHUB_REF#refs/tags/}" raw2ometiff-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
